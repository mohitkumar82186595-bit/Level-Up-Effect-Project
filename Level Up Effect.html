<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Effect</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    width:420px;
    padding:30px;
    background:#1e293b;
    border-radius:20px;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,.5);
    position:relative;
}

.level{
    font-size:42px;
    font-weight:bold;
    color:#facc15;
    margin-bottom:20px;
}

.xp-text{
    margin-bottom:10px;
    color:#cbd5e1;
}

.bar{
    width:100%;
    height:22px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
}

.fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#22c55e,#4ade80);
    transition:width .3s;
}

button{
    margin-top:25px;
    padding:14px 30px;
    border:none;
    border-radius:10px;
    background:#facc15;
    color:black;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    transform:scale(1.05);
}

.levelup{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    font-size:60px;
    font-weight:bold;
    color:#facc15;
    text-shadow:0 0 20px gold;
    pointer-events:none;
}

.show{
    animation:levelupAnim 1.5s ease forwards;
}

@keyframes levelupAnim{
    0%{
        transform:translate(-50%,-50%) scale(0);
        opacity:0;
    }
    30%{
        transform:translate(-50%,-50%) scale(1.3);
        opacity:1;
    }
    100%{
        transform:translate(-50%,-150%) scale(1);
        opacity:0;
    }
}

.glow{
    animation:glowEffect 1s;
}

@keyframes glowEffect{
    0%{
        box-shadow:0 0 0 gold;
    }
    50%{
        box-shadow:0 0 60px gold;
    }
    100%{
        box-shadow:0 0 0 gold;
    }
}

.particle{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:gold;
    pointer-events:none;
}
</style>
</head>
<body>

<div class="card" id="card">

    <div class="level">
        LEVEL <span id="level">1</span>
    </div>

    <div class="xp-text">
        XP: <span id="xp">0</span> / 100
    </div>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <button onclick="gainXP()">
        Gain XP
    </button>

    <div class="levelup" id="levelup">
        LEVEL UP!
    </div>

</div>

<script>
let xp = 0;
let level = 1;

const xpText = document.getElementById("xp");
const fill = document.getElementById("fill");
const levelText = document.getElementById("level");
const levelUpText = document.getElementById("levelup");
const card = document.getElementById("card");

function gainXP(){

    xp += 20;

    if(xp >= 100){

        xp = 0;
        level++;

        levelText.textContent = level;

        card.classList.add("glow");

        levelUpText.classList.add("show");

        createParticles();

        setTimeout(()=>{
            levelUpText.classList.remove("show");
            card.classList.remove("glow");
        },1500);
    }

    xpText.textContent = xp;
    fill.style.width = xp + "%";
}

function createParticles(){

    for(let i=0;i<25;i++){

        const particle = document.createElement("div");
        particle.classList.add("particle");

        particle.style.left = "200px";
        particle.style.top = "180px";

        card.appendChild(particle);

        const x = (Math.random()-0.5)*400;
        const y = (Math.random()-0.5)*400;

        particle.animate([
            {
                transform:'translate(0,0)',
                opacity:1
            },
            {
                transform:`translate(${x}px,${y}px)`,
                opacity:0
            }
        ],{
            duration:1200,
            easing:'ease-out'
        });

        setTimeout(()=>{
            particle.remove();
        },1200);
    }
}
</script>

</body>
</html>
